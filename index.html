<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단순업무 인력 최적화 보고</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111118;
  --surface: #1A1A24;
  --card: #22222E;
  --border: #2E2E3E;
  --border-hover: #42425A;
  --text: #F0F0F5;
  --text-dim: #DCDCE6;
  --text-muted: #A0A0B8;
  --text-faint: #78788E;
  --text-ghost: #5A5A72;
  --text-void: #42425A;
  --outsource: #F87171; --outsource-bg: rgba(248,113,113,0.15); --outsource-border: rgba(248,113,113,0.35);
  --freelance: #C084FC; --freelance-bg: rgba(192,132,252,0.15); --freelance-border: rgba(192,132,252,0.35);
  --contract: #FBBF24; --contract-bg: rgba(251,191,36,0.15); --contract-border: rgba(251,191,36,0.35);
  --auto: #34D399; --auto-bg: rgba(52,211,153,0.15); --auto-border: rgba(52,211,153,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: rgba(192,132,252,0.3); }
body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1080px; margin: 0 auto; padding: 0 16px; height: 54px; display: flex; align-items: center; justify-content: space-between; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 26px; height: 26px; background: linear-gradient(135deg, #C084FC, #60A5FA); border-radius: 5px; display: flex; align-items: center; justify-content: center; }
.logo-icon span { width: 9px; height: 9px; border-radius: 2px; border: 2px solid white; display: block; }
.header-title { font-size: 13px; font-weight: 700; }
.header-sub { font-size: 10px; color: var(--text-muted); }
.header-actions { display: flex; gap: 6px; align-items: center; }
.header-time { font-size: 10px; color: var(--text-faint); margin-right: 4px; }

.btn { border: none; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 600; padding: 7px 14px; border-radius: 5px; transition: all 0.15s; }
.btn:active { transform: scale(0.97); }
.btn-ghost { background: var(--card); color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); background: var(--border-hover); border-color: var(--border-hover); }
.btn-primary { background: linear-gradient(135deg, #7C3AED, #6366F1); color: #fff; font-weight: 700; }
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.toast { position: fixed; top: 64px; right: 16px; z-index: 999; padding: 10px 18px; border-radius: 6px; font-size: 12px; font-weight: 600; max-width: calc(100vw - 32px); animation: toastIn 0.3s ease; pointer-events: none; }
.toast.success { background: #0E1A14; border: 1px solid #1A3D2A; color: var(--auto); }
.toast.error { background: #2D1215; border: 1px solid #5C2023; color: var(--outsource); }
.toast.hidden { display: none; }

.container { max-width: 1080px; margin: 0 auto; padding: 20px 16px 80px; }

.cover { background: linear-gradient(135deg, var(--card) 0%, var(--border) 100%); border: 1px solid var(--border); border-radius: 10px; padding: 28px 24px 24px; margin-bottom: 20px; }
.cover-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); font-weight: 600; margin-bottom: 12px; }
.cover h1 { font-family: 'DM Serif Display', serif; font-size: clamp(22px, 5vw, 32px); color: var(--text); font-weight: 400; line-height: 1.3; margin-bottom: 8px; }
.cover p { font-size: 13px; color: var(--text-muted); line-height: 1.7; max-width: 500px; }
.progress-wrap { margin-top: 20px; display: flex; align-items: center; gap: 14px; }
.progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #7C3AED, #60A5FA); border-radius: 2px; transition: width 0.4s ease; }
.progress-num { font-size: 12px; font-weight: 700; color: var(--text-muted); white-space: nowrap; }
.progress-num .dim { color: var(--text-ghost); }

.sync-status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-faint); margin-top: 12px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; }
.sync-dot.online { background: var(--auto); box-shadow: 0 0 6px var(--auto); }
.sync-dot.offline { background: var(--outsource); }

.team-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
.team-tab { padding: 14px 10px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit; }
.team-tab:hover { border-color: var(--border-hover); }
.team-tab.active { background: var(--border); }
.team-tab .tab-label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
.team-tab .tab-count { font-size: 10px; color: var(--text-faint); margin-top: 3px; }
.team-tab.active .tab-label { font-weight: 700; }

.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; transition: border-color 0.2s; animation: fadeIn 0.25s ease both; }
.task-card:hover { border-color: var(--border-hover); }
.task-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.task-info { flex: 1; min-width: 160px; }
.task-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
.task-name { font-size: 13px; font-weight: 700; color: var(--text-dim); }
.freq-badge { font-size: 10px; background: var(--border); color: var(--text-muted); padding: 2px 8px; border-radius: 3px; }
.sel-badge { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 3px; }
.task-desc { font-size: 11px; color: var(--text-faint); }
.type-btns { display: flex; gap: 4px; flex-shrink: 0; }
.type-btn { padding: 6px 12px; border-radius: 5px; font-size: 11px; font-weight: 500; cursor: pointer; background: var(--card); color: var(--text-muted); border: 1px solid var(--border-hover); font-family: inherit; transition: all 0.15s; }
.type-btn:hover { border-color: var(--text-ghost); color: var(--text-dim); }
.task-note { margin-top: 10px; }
.task-note input { width: 100%; padding: 7px 12px; border-radius: 5px; border: 1px solid var(--border-hover); font-size: 11px; color: var(--text-dim); background: var(--card); font-family: inherit; outline: none; }
.task-note input:focus { border-color: var(--text-faint); }
.task-note input::placeholder { color: var(--text-faint); }

.summary-container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 32px; }
.stat-card { background: var(--surface); border-radius: 8px; padding: 20px 16px; text-align: center; }
.stat-type { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
.stat-num { font-family: 'DM Serif Display', serif; font-size: 36px; line-height: 1; }
.stat-total { font-size: 10px; color: var(--text-void); margin-top: 4px; }

.section-block { margin-bottom: 28px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 10px; }
.section-marker { width: 3px; height: 20px; border-radius: 2px; }
.section-head h3 { font-size: 15px; font-weight: 800; }
.section-count { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 4px; margin-left: auto; }

.data-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: 100%; }
.table-header { display: grid; grid-template-columns: 110px 1fr 70px 180px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.table-header div { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; color: var(--text-faint); }
.table-row { display: grid; grid-template-columns: 110px 1fr 70px 180px; padding: 12px 16px; align-items: center; border-bottom: 1px solid var(--card); }
.table-row:last-child { border-bottom: none; }
.table-row-mobile { display: none; padding: 12px 16px; border-bottom: 1px solid var(--card); }
.table-row-mobile:last-child { border-bottom: none; }

.team-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; display: inline-block; }
.row-name { font-size: 12px; font-weight: 600; color: var(--text-dim); }
.row-desc { font-size: 10px; color: var(--text-faint); margin-top: 1px; }
.row-freq { font-size: 11px; color: var(--text-muted); }
.row-note { font-size: 11px; color: var(--text-faint); }

.unselected-section { margin-top: 20px; padding-top: 24px; border-top: 1px solid var(--border); }
.unselected-row { padding: 10px 16px; border-bottom: 1px solid var(--card); opacity: 0.45; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.unselected-row:last-child { border-bottom: none; }
.complete-banner { text-align: center; padding: 28px; border-radius: 8px; margin-top: 20px; border: 1px solid var(--auto-border); background: var(--auto-bg); }
.complete-banner p { font-size: 14px; font-weight: 700; color: var(--auto); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .team-tabs { grid-template-columns: 1fr 1fr; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .type-btns { flex-wrap: wrap; }
  .type-btn { padding: 6px 10px; font-size: 10px; }
  .header-sub, .header-time { display: none; }
  .table-header, .table-row { display: none; }
  .table-row-mobile { display: block; }
  .task-top { flex-direction: column; gap: 10px; }
  .type-btns { width: 100%; }
  .type-btn { flex: 1; text-align: center; }
  .stat-num { font-size: 28px; }
}
</style>
</head>

    { id:"g9", name:"\uac1c\ubcc4 \ub370\uc774\ud130 \ucd94\ucd9c", desc:"\ud544\uc694 \ub370\uc774\ud130 \uac74\ubcc4 \uc218\ub3d9 \ucd94\ucd9c", freq:"\uc218\uc2dc" },
    { id:"g10", name:"\uae30\uc548/\uc9c0\ucd9c\uacb0\uc758\uc11c \uc791\uc131", desc:"\uc608\uc0b0 \uc9d1\ud589 \uad00\ub828 \ub0b4\ubd80 \uacb0\uc7ac \uc11c\ub958 \uc791\uc131", freq:"\uc218\uc2dc" },
  ]},
  ai: { label: "AI \uc544\ud2b8\uc0ac\uc5c5\ud300", accent: "#C084FC", tasks: [
    { id:"a1", name:"AI \ud06c\ub808\ub527\xb7\uacc4\uc815 \uad00\ub9ac", desc:"AI \ud234 \ud06c\ub808\ub527 \ud604\ud669 \ud655\uc778 \ubc0f \uacc4\uc815 \uad00\ub9ac", freq:"\uc218\uc2dc" },
    { id:"a2", name:"AI \ud06c\ub9ac\uc5d0\uc774\ud130 \ubc1c\uad74\xb7\ucee8\ud0dd", desc:"\uc2e0\uaddc \ud06c\ub9ac\uc5d0\uc774\ud130 \ub9ac\uc11c\uce58 \ubc0f \ucd08\uae30 \ucee8\ud0dd", freq:"\uc218\uc2dc" },
    { id:"a3", name:"AI \uc6f9\ud230 \ucf58\ud2f0\xb7\ud6c4\ubcf4\uc815\xb7\uc2dd\uc790", desc:"\uc6f9\ud230 \uc81c\uc791 \uacfc\uc815 \uc911 \ubc18\ubcf5 \uc791\uc5c5 \ubd80\ubd84", freq:"\uc791\ud488\ub2f9" },
    { id:"a4", name:"AI \uc601\uc0c1 \ud3b8\uc9d1\xb7\uc74c\uc131\xb7\ucef7 \ubd84\ud560", desc:"\uc601\uc0c1 \uc81c\uc791 \uacfc\uc815 \uc911 \ubc18\ubcf5 \ud3b8\uc9d1 \uc791\uc5c5", freq:"\uc791\ud488\ub2f9" },
    { id:"a5", name:"IP \uac80\ud1a0 \ud0c0\ubd80\uc11c \uc18c\ud1b5", desc:"IP \ud611\uc758\ub97c \uc704\ud55c \ub0b4\ubd80 \ubd80\uc11c \uac04 \ucee4\ubba4\ub2c8\ucf00\uc774\uc158", freq:"\uc218\uc2dc" },
    { id:"a6", name:"AI \uc6f9\ud230\xb7\uc601\uc0c1 \uc378\ub124\uc77c \uc791\uc5c5", desc:"\ucc44\ub110 \ub4f1\ub85d\uc6a9 \uc378\ub124\uc77c \uc774\ubbf8\uc9c0 \uc81c\uc791", freq:"\uc791\ud488\ub2f9" },
    { id:"a7", name:"\uc791\ud488 \uc5c5\ub85c\ub4dc \ubc0f \uc2a4\ucf00\uc904 \uad00\ub9ac", desc:"\ud50c\ub7ab\ud3fc \uc5c5\ub85c\ub4dc \ubc0f \uacf5\uac1c \uc77c\uc815 \uad00\ub9ac", freq:"\uc218\uc2dc" },
    { id:"a8", name:"\uacc4\uc57d\uc11c \uad00\ub9ac", desc:"\uacc4\uc57d\uc11c \ud30c\uc77c \uc815\ub9ac \ubc0f \ud604\ud669 \uad00\ub9ac", freq:"\uc218\uc2dc" },
    { id:"a9", name:"\uae30\uc548/\uc9c0\ucd9c\uacb0\uc758\uc11c \uc791\uc131", desc:"\uc608\uc0b0 \uc9d1\ud589 \uad00\ub828 \ub0b4\ubd80 \uacb0\uc7ac \uc11c\ub958 \uc791\uc131", freq:"\uc218\uc2dc" },
  ]},
};

var TYPES = [
  { key:"outsource", label:"\uc678\uc8fc",    color:"var(--outsource)", bg:"var(--outsource-bg)", border:"var(--outsource-border)" },
  { key:"freelance", label:"\ud504\ub9ac\ub79c\uc11c", color:"var(--freelance)", bg:"var(--freelance-bg)", border:"var(--freelance-border)" },
  { key:"contract",  label:"\uacc4\uc57d\uc9c1",  color:"var(--contract)",  bg:"var(--contract-bg)",  border:"var(--contract-border)" },
  { key:"auto",      label:"\uc790\ub3d9\ud654",  color:"var(--auto)",      bg:"var(--auto-bg)",      border:"var(--auto-border)" },
];

var totalTasks = Object.values(TEAMS).reduce(function(a, t) { return a + t.tasks.length; }, 0);
var selections = {};
var notes = {};
var savedAt = null;
var activeTeam = "marketing";
var currentView = "select";
var isOnline = false;

// ═══ Init ═══
async function init() {
  try {
    var rows = await supaFetch("GET");
    if (rows && rows.length > 0) {
      var d = rows[0];
      selections = d.selections || {};
      notes = d.notes || {};
      savedAt = d.updated_at ? new Date(d.updated_at).toLocaleString("ko-KR") : null;
      isOnline = true;
    }
  } catch (e) {
    console.error("Supabase load error:", e);
    try {
      var raw = localStorage.getItem("task-opt-backup");
      if (raw) { var d2 = JSON.parse(raw); selections = d2.selections || {}; notes = d2.notes || {}; savedAt = d2.savedAt || null; }
    } catch(e2) {}
    isOnline = false;
  }
  document.getElementById("loadingOverlay").style.display = "none";
  document.getElementById("progressTotal").textContent = "/" + totalTasks;
  updateSyncStatus();
  if (savedAt) document.getElementById("savedTime").textContent = savedAt;
  renderTeamTabs();
  renderTaskList();
}

function updateSyncStatus() {
  var dot = document.getElementById("syncDot");
  var txt = document.getElementById("syncText");
  if (isOnline) { dot.className = "sync-dot online"; txt.textContent = "Supabase \uc5f0\uacb0\ub428 \u2014 \uc2e4\uc2dc\uac04 \uacf5\uc720 \ud65c\uc131"; }
  else { dot.className = "sync-dot offline"; txt.textContent = "\uc624\ud504\ub77c\uc778 \u2014 \ub85c\uceec \uc800\uc7a5 \ubaa8\ub4dc"; }
}

var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast " + (type || "success");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.className = "toast hidden"; }, 2800);
}

async function saveData() {
  var btn = document.getElementById("saveBtn");
  btn.disabled = true; btn.textContent = "\uc800\uc7a5 \uc911...";
  localStorage.setItem("task-opt-backup", JSON.stringify({ selections: selections, notes: notes, savedAt: new Date().toLocaleString("ko-KR") }));
  try {
    await supaFetch("PATCH", { selections: selections, notes: notes, updated_at: new Date().toISOString() });
    var now = new Date().toLocaleString("ko-KR");
    savedAt = now; document.getElementById("savedTime").textContent = now;
    isOnline = true; updateSyncStatus();
    showToast("\uc800\uc7a5 \uc644\ub8cc \u2014 URL\uc744 \uacf5\uc720\ud558\uba74 \ub204\uad6c\ub098 \ud655\uc778 \uac00\ub2a5", "success");
  } catch (e) {
    console.error("Save error:", e);
    isOnline = false; updateSyncStatus();
    showToast("Supabase \uc800\uc7a5 \uc2e4\ud328 \u2014 \ub85c\uceec\uc5d0 \ubc31\uc5c5\ub428", "error");
  }
  btn.disabled = false; btn.textContent = "\uc800\uc7a5";
}

async function refreshData() {
  try {
    var rows = await supaFetch("GET");
    if (rows && rows.length > 0) {
      var d = rows[0]; selections = d.selections || {}; notes = d.notes || {};
      savedAt = d.updated_at ? new Date(d.updated_at).toLocaleString("ko-KR") : null;
      isOnline = true; updateSyncStatus();
      if (savedAt) document.getElementById("savedTime").textContent = savedAt;
      renderTeamTabs(); renderTaskList();
      if (currentView === "summary") renderSummary();
      showToast("\ucd5c\uc2e0 \ub370\uc774\ud130\ub97c \uc11c\ubc84\uc5d0\uc11c \ubd88\ub7ec\uc654\uc2b5\ub2c8\ub2e4", "success");
    }
  } catch (e) { isOnline = false; updateSyncStatus(); showToast("\uc11c\ubc84 \uc5f0\uacb0 \uc2e4\ud328", "error"); }
}

function toggleView() {
  currentView = currentView === "select" ? "summary" : "select";
  document.getElementById("selectView").style.display = currentView === "select" ? "" : "none";
  document.getElementById("summaryView").style.display = currentView === "summary" ? "" : "none";
  document.getElementById("viewToggle").textContent = currentView === "select" ? "\uc694\uc57d \ubcf4\uae30" : "\ubd84\ub958 \uc785\ub825";
  if (currentView === "summary") renderSummary();
}

function toggleType(taskId, type) { selections[taskId] = selections[taskId] === type ? null : type; renderTeamTabs(); renderTaskList(); }
function setNote(taskId, val) { notes[taskId] = val; }
function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function getSelectedCount() { return Object.values(selections).filter(Boolean).length; }

function renderTeamTabs() {
  var wrap = document.getElementById("teamTabs"); var html = "";
  Object.entries(TEAMS).forEach(function(entry) {
    var key = entry[0], team = entry[1];
    var done = team.tasks.filter(function(t) { return selections[t.id]; }).length;
    var isActive = activeTeam === key;
    var border = isActive ? "border-color:" + team.accent + "40" : "";
    html += '<button class="team-tab' + (isActive?" active":"") + '" style="' + border + '" onclick="activeTeam=\'' + key + '\';renderTeamTabs();renderTaskList();">' +
      '<div class="tab-label" style="' + (isActive?"color:"+team.accent:"") + '">' + team.label + '</div>' +
      '<div class="tab-count">' + done + '/' + team.tasks.length + '</div></button>';
  });
  wrap.innerHTML = html;
}

function renderTaskList() {
  var team = TEAMS[activeTeam]; var wrap = document.getElementById("taskList");
  var count = getSelectedCount();
  document.getElementById("progressDone").textContent = count;
  document.getElementById("progressFill").style.width = (count/totalTasks*100) + "%";
  var html = "";
  team.tasks.forEach(function(task, i) {
    var sel = selections[task.id]; var selType = TYPES.find(function(t) { return t.key === sel; });
    var borderColor = selType ? selType.border : "var(--border)";
    var badgeHTML = selType ? '<span class="sel-badge" style="background:'+selType.bg+';color:'+selType.color+';border:1px solid '+selType.border+'">'+selType.label+'</span>' : "";
    var btnsHTML = TYPES.map(function(t) {
      var isAct = sel === t.key;
      var style = isAct ? "background:"+t.bg+";color:"+t.color+";border-color:"+t.border+";font-weight:700" : "";
      return '<button class="type-btn'+(isAct?" active":"")+'" style="'+style+'" onclick="toggleType(\''+task.id+"','"+t.key+'\')">'+t.label+'</button>';
    }).join("");
    var noteHTML = sel ? '<div class="task-note"><input type="text" value="'+esc(notes[task.id]||"")+'" placeholder="\uba54\ubaa8 (\uc120\uc815 \uc774\uc720, \ub2f4\ub2f9\uc790 \ub4f1)" onchange="setNote(\''+task.id+'\', this.value)"></div>' : "";
    html += '<div class="task-card" style="border-color:'+borderColor+';animation-delay:'+i*0.03+'s">' +
      '<div class="task-top"><div class="task-info"><div class="task-name-row">' +
      '<span class="task-name">'+task.name+'</span><span class="freq-badge">'+task.freq+'</span>'+badgeHTML+'</div>' +
      '<div class="task-desc">'+task.desc+'</div></div><div class="type-btns">'+btnsHTML+'</div></div>'+noteHTML+'</div>';
  });
  wrap.innerHTML = html;
}

function renderSummary() {
  var wrap = document.getElementById("summaryView");
  var byType = {}; TYPES.forEach(function(t) { byType[t.key] = []; });
  Object.entries(TEAMS).forEach(function(entry) {
    var key = entry[0], team = entry[1];
    team.tasks.forEach(function(task) {
      var t = selections[task.id];
      if (t) byType[t].push({ id:task.id, name:task.name, desc:task.desc, freq:task.freq, teamKey:key, teamLabel:team.label, teamAccent:team.accent });
    });
  });
  var count = getSelectedCount(); var html = "";
  html += '<div class="cover"><div class="cover-label">Summary Report</div>' +
    '<h1 style="font-size:clamp(20px,4vw,28px)">\uc778\ub825 \ucd5c\uc801\ud654 \uc694\uc57d \ubcf4\uace0</h1>' +
    '<p style="font-size:12px;color:var(--text-faint)">'+count+'\uac1c \uc5c5\ubb34 \ubd84\ub958 \uc644\ub8cc'+(savedAt?" \xb7 \ub9c8\uc9c0\ub9c9 \uc800\uc7a5: "+savedAt:"")+'</p></div>';
  html += '<div class="stat-grid">';
  TYPES.forEach(function(t) {
    html += '<div class="stat-card" style="border:1px solid '+t.border+'"><div class="stat-type" style="color:'+t.color+'">'+t.label+'</div>' +
      '<div class="stat-num" style="color:'+t.color+'">'+byType[t.key].length+'</div><div class="stat-total">/ '+totalTasks+'</div></div>';
  });
  html += '</div>';
  TYPES.forEach(function(t) {
    var items = byType[t.key]; if (!items.length) return;
    html += '<div class="section-block"><div class="section-head" style="border-bottom:1px solid '+t.border+'">' +
      '<div class="section-marker" style="background:'+t.color+'"></div><h3 style="color:'+t.color+'">'+t.label+'</h3>' +
      '<span class="section-count" style="color:'+t.color+';background:'+t.bg+';border:1px solid '+t.border+'">'+items.length+'\uac74</span></div>' +
      '<div class="data-table"><div class="table-header"><div>\uc18c\uc18d</div><div>\uc5c5\ubb34\uba85</div><div>\ube48\ub3c4</div><div>\uba54\ubaa8</div></div>';
    items.forEach(function(task) {
      html += '<div class="table-row"><div><span class="team-badge" style="color:'+task.teamAccent+';background:'+task.teamAccent+'15">'+task.teamLabel+'</span></div>' +
        '<div><div class="row-name">'+task.name+'</div><div class="row-desc">'+task.desc+'</div></div>' +
        '<div class="row-freq">'+task.freq+'</div><div class="row-note">'+(notes[task.id]?esc(notes[task.id]):"\u2014")+'</div></div>';
      html += '<div class="table-row-mobile"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
        '<span class="team-badge" style="color:'+task.teamAccent+';background:'+task.teamAccent+'15">'+task.teamLabel+'</span>' +
        '<span style="font-size:10px;color:var(--text-faint)">'+task.freq+'</span></div>' +
        '<div class="row-name">'+task.name+'</div>'+(notes[task.id]?'<div style="font-size:11px;color:var(--text-faint);margin-top:4px">'+esc(notes[task.id])+'</div>':'')+'</div>';
    });
    html += '</div></div>';
  });
  var unsel = [];
  Object.entries(TEAMS).forEach(function(entry) {
    var key = entry[0], team = entry[1];
    team.tasks.forEach(function(task) {
      if (!selections[task.id]) unsel.push({ name:task.name, freq:task.freq, teamLabel:team.label, teamAccent:team.accent });
    });
  });
  if (unsel.length === 0) {
    html += '<div class="complete-banner"><p>\ubaa8\ub4e0 \uc5c5\ubb34\uac00 \ubd84\ub958 \uc644\ub8cc\ub418\uc5c8\uc2b5\ub2c8\ub2e4</p></div>';
  } else {
    html += '<div class="unselected-section"><div class="section-head" style="border-bottom:1px solid var(--border)">' +
      '<div class="section-marker" style="background:var(--text-faint)"></div><h3 style="color:var(--text-ghost)">\ubbf8\ubd84\ub958 \uc5c5\ubb34</h3>' +
      '<span class="section-count" style="color:var(--text-faint);background:var(--border)">'+unsel.length+'\uac74</span></div><div class="data-table">';
    unsel.forEach(function(task) {
      html += '<div class="unselected-row"><span class="team-badge" style="color:'+task.teamAccent+';background:'+task.teamAccent+'15">'+task.teamLabel+'</span>' +
        '<span style="font-size:12px;color:var(--text-faint)">'+task.name+'</span>' +
        '<span style="font-size:10px;color:var(--text-void);margin-left:auto">'+task.freq+'</span></div>';
    });
    html += '</div></div>';
  }
  wrap.innerHTML = html;
}

init();
</script>
</body>
</html>
